# 将 dialect-frontend 构建后部署到 GitHub Pages
# 使用前请在仓库 Settings → Pages → Build and deployment → Source 选择「GitHub Actions」

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 勿写 cache-dependency-path：若未提交 package-lock.json 或路径不对会报
      # "unable to cache dependencies"。需要缓存时在确保 lock 文件已 push 后再加回。
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: dialect-frontend
        run: |
          # 先跳过脚本，避免 electron-builder postinstall 在 CI 中失败
          npm ci --ignore-scripts
          # 仅补装 Electron 二进制，满足 vue-cli-plugin-electron-builder 的 require
          node node_modules/electron/install.js
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dialect-frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
